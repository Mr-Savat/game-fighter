<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Street Fighter</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- START SCREEN -->
  <div id="startScreen">
    <div class="logo">FIGHTER</div>
    <div class="logo-sub">Street Fighter</div>

    <div class="avatar-panel">
      <h3>// Your Fighter</h3>
      <img id="avatarPreview" src="" alt="Avatar">
      <label class="upload-btn">
        <div class="btn btn-ghost">📁 Upload Face</div>
        <input type="file" id="avatarInput" accept="image/*">
      </label>
      <input type="text" id="playerNameInput" placeholder="YOUR NAME" maxlength="12" style="margin-top:12px; background: #0a0a0f; color: var(--neon-blue); border: 1px solid #334; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 4px; text-align: center; text-transform: uppercase;">
    </div>

    <div class="controls-hint">
      <span>A / D</span> (Hold Back = BLOCK) &nbsp;|&nbsp; <span>S</span> CROUCH &nbsp;|&nbsp; <span>W</span> JUMP<br>
      <span>SPACE</span> PUNCH &nbsp;|&nbsp; <span>K</span> KICK &nbsp;|&nbsp; <span class="special">SHIFT</span>
      SPECIAL
    </div>

    <div style="display: flex; gap: 16px; margin-top: 10px;">
      <button class="btn-start" id="startBtn">PLAY SOLO</button>
      <button class="btn-start" id="hostBtn"
        style="background: linear-gradient(135deg, var(--neon-purple), #80f); box-shadow: 0 0 24px rgba(191,95,255,0.4);">HOST
        1v1</button>
      <button class="btn-start" id="hostFfaBtn"
        style="background: linear-gradient(135deg, #ff0055, #ff6b35); box-shadow: 0 0 24px rgba(255,0,85,0.4);">HOST
        FFA</button>
    </div>

    <!-- Online waiting panel -->
    <div id="onlinePanel"
      style="display: none; flex-direction: column; align-items: center; gap: 12px; margin-top: 10px; background: var(--panel); padding: 16px; border: 1px solid var(--neon-purple); border-radius: 8px; box-shadow: 0 0 16px rgba(191,95,255,0.2);">
      <div id="onlineStatus"
        style="color: var(--neon-purple); font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">Connecting
        to Network...</div>
      <input type="text" id="inviteLink" readonly
        style="background: #0a0a0f; color: var(--neon-blue); border: 1px solid #333; padding: 10px; width: 320px; text-align: center; font-family: monospace; font-size: 12px; border-radius: 4px; cursor: copy;"
        onclick="this.select()" value="Loading...">
      <div id="linkHint" style="font-size: 11px; color: #888;">Send this shareable link to a friend!</div>

      <button class="btn-start" id="startOnlineBtn" style="display: none; font-size: 14px; padding: 10px 24px;">START
        ALL Players Ready</button>
      <div id="lobbyProfiles" style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; justify-content: center;"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameWrapper">
    <div id="hud">
      <div class="fighter-hud">
        <div class="fighter-name" id="playerNameDisplay">PLAYER</div>
        <div class="health-track" style="width:350px">
          <div id="playerHealthBar"></div>
        </div>
        <div class="energy-track" style="width:350px">
          <div id="playerEnergyBar"></div>
        </div>
      </div>
      <div class="vs-col">
        <div id="roundTimer"
          style="font-family: 'Black Ops One', cursive; font-size: 28px; color: var(--neon-yellow); filter: drop-shadow(0 0 8px rgba(255,230,0,0.6));">
          99</div>
        <div id="roundLabel">ROUND</div>
        <div class="round-score" id="roundScore"><span id="pScore">0</span> — <span id="eScore">0</span></div>
      </div>
      <div class="fighter-hud enemy">
        <div class="fighter-name" id="enemyNameDisplay">ENEMY</div>
        <div class="health-track" style="width:350px">
          <div id="enemyHealthBar"></div>
        </div>
        <div class="energy-track" style="width:350px">
          <div id="enemyEnergyBar"></div>
        </div>
      </div>
    </div>

    <canvas id="gameCanvas" width="820" height="430"></canvas>
    
    <!-- Mobile Touch Controls -->
    <div id="touchControls">
      <div class="dpad">
        <div id="btnUp" class="t-btn btn-up">W</div>
        <div id="btnLeft" class="t-btn btn-left">A</div>
        <div id="btnRight" class="t-btn btn-right">D</div>
        <div class="center-hole"></div>
        <div id="btnDown" class="t-btn btn-down">S</div>
      </div>
      <div class="action-pad">
        <div id="btnSpecial" class="t-btn btn-special">⭐</div>
        <div id="btnKick" class="t-btn btn-kick">K</div>
        <div id="btnPunch" class="t-btn btn-punch">P</div>
      </div>
    </div>

    <button id="fsBtn" onclick="toggleFS()" style="
    margin-top:20px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:12px;letter-spacing:1px;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.6);padding:10px 24px;border-radius:24px;cursor:pointer;
    text-transform:uppercase;transition:all 0.2s;
  " onmouseover="this.style.color='#fff';this.style.background='rgba(255,255,255,0.1)'"
      onmouseout="this.style.color='rgba(255,255,255,0.6)';this.style.background='rgba(255,255,255,0.05)'">
      ⛶ FULLSCREEN
    </button>
  </div>

  <div id="superReady">⚡ SUPER READY ⚡</div>

  <!-- RESULT OVERLAY -->
  <div id="overlay">
    <div id="overlayTitle">GAME OVER</div>
    <div id="roundResult">—</div>
    <div id="overlaySubtitle">...</div>
    <div style="display: flex; gap: 16px; margin-top: 20px;">
      <button class="btn-start" id="restartBtn" style="font-size:14px;padding:13px 36px">REMATCH</button>
      <button class="btn-start" id="homeBtn" style="font-size:14px;padding:13px 36px; background: linear-gradient(135deg, #444, #666); box-shadow: 0 0 16px rgba(100,100,100,0.4);">HOME</button>
    </div>
  </div>

  <!-- Networking Library -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <!-- Game Scripts -->
  <script src="js/audio.js"></script>
  <script src="js/network.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/fighter.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
